# UGTS-DTI Default Configuration

# General Settings
dataset: "KIBA"
seed: 10
device: "cuda" # or "cpu"

# Training Hyperparameters
train:
  epochs: 100
  batch_size: 32
  lr: 0.0005
  patience: 10
  weight_decay: 0.0
  lr_step_size: 10
  lr_gamma: 0.1

# Model Architecture
model:
  dim: 256
  
  student:
    drug_encoding: "MPNN"
    target_encoding: "CNN"
    # DeepPurpose config will be derived from these if needed
    
  teacher:
    n_heads: 8
    dia_layers: 2
    dropout: 0.1
    mlp_hidden: 128
    k_dd: 10
    k_pp: 10
    
  fusion:
    mc_samples: 6
    temperature: 2.0
    gate_hidden: 32
    kd_weight: 0.1
    reg_weight: 0.01

# Output Settings
output:
  root: "output"
  save_model: true
